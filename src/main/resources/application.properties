spring.application.name=thymeleaf

# Conexao com MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/logindb
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Dialeto do Hibernate para MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Cria/atualiza tabelas automaticamente sem apagar dados
spring.jpa.hibernate.ddl-auto=update

# Exibe os SQLs no console
spring.jpa.show-sql=true

# Formata o SQL no console para facilitar leitura
spring.jpa.properties.hibernate.format_sql=true

server.port=8080