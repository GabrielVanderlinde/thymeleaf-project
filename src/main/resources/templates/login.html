<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 text-center mb-4">Login</h1>

                    <div class="alert alert-danger" role="alert" th:if="${erro}" th:text="${erro}">
                        E-mail ou senha invalidos.
                    </div>

                    <form method="post" th:action="@{/login}">

                        <div class="mb-3">
                            <label class="form-label" for="email">E-mail</label>
                            <input class="form-control" id="email" name="email" placeholder="Digite seu e-mail" required
                                   th:value="${email}" type="email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="senha">Senha</label>
                            <input class="form-control" id="senha" name="senha" placeholder="Digite sua senha"
                                   required type="password">
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
